<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FACE Prep · Sign in</title>
<style>
:root{
  --sans:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Helvetica Neue",Helvetica,Arial,sans-serif;
  --accent:#ff6a00; --bg:#f5f5f7; --bg2:#ececee; --panel:#fff;
  --line:rgba(0,0,0,.1); --line2:rgba(0,0,0,.14); --ink:#1d1d1f; --ink2:#515154; --ink3:#86868b;
  --rose:#ff453a; --good:#34c759;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#000; --bg2:#1c1c1e; --panel:#1c1c1e; --line:rgba(255,255,255,.12);
  --line2:rgba(255,255,255,.18); --ink:#f5f5f7; --ink2:#aeaeb2; --ink3:#8e8e93;
}}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:
  radial-gradient(900px 500px at 50% -5%, rgba(255,106,0,.14), transparent 60%), var(--bg);
  color:var(--ink);font-family:var(--sans);-webkit-font-smoothing:antialiased;letter-spacing:-.01em;
  display:grid;place-items:center;padding:22px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:22px;padding:38px 34px;
  width:100%;max-width:392px;box-shadow:0 1px 3px rgba(0,0,0,.06),0 24px 70px rgba(0,0,0,.12);text-align:center}
.logo{width:60px;height:60px;border-radius:17px;background:linear-gradient(135deg,var(--accent),#ff5e00);
  display:grid;place-items:center;font-weight:700;font-size:28px;color:#fff;margin:0 auto 20px;
  box-shadow:0 10px 26px rgba(255,106,0,.4)}
h1{font-size:21px;font-weight:600;letter-spacing:-.02em}
p.sub{color:var(--ink3);font-size:13px;margin:6px 0 26px;line-height:1.5}
label{display:block;text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.05em;
  color:var(--ink3);font-weight:600;margin-bottom:7px}
input{width:100%;background:var(--bg2);border:1px solid var(--line);color:var(--ink);
  padding:13px 15px;border-radius:13px;font-size:16px;font-family:inherit;min-height:50px;transition:.15s}
input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 4px rgba(255,106,0,.16)}
button{width:100%;margin-top:16px;background:var(--accent);color:#fff;border:none;padding:14px;
  border-radius:13px;font-size:16px;font-weight:600;font-family:inherit;cursor:pointer;min-height:52px;transition:.15s}
button:hover{filter:brightness(1.05)} button:active{transform:scale(.99)}
button:disabled{opacity:.6;cursor:default}
.msg{margin-top:14px;font-size:13px;min-height:18px}
.msg.err{color:var(--rose)} .msg.ok{color:var(--good)}
.foot{margin-top:22px;color:var(--ink3);font-size:11px;line-height:1.5}
</style>
</head>
<body>
  <form class="card" id="form">
    <div class="logo">F</div>
    <h1>FACE Prep</h1>
    <p class="sub">Invoicing &amp; Collections Summary<br>Authorised access only</p>
    <label for="pw">Password</label>
    <input type="password" id="pw" autocomplete="current-password" placeholder="Enter team password" autofocus>
    <button type="submit" id="btn">Sign in</button>
    <div class="msg" id="msg"></div>
    <div class="foot">Sessions expire after 12 hours.</div>
  </form>
<script>
const form=document.getElementById('form'),pw=document.getElementById('pw'),
      btn=document.getElementById('btn'),msg=document.getElementById('msg');
form.addEventListener('submit',async e=>{
  e.preventDefault();
  msg.className='msg';msg.textContent='';
  btn.disabled=true;btn.textContent='Signing in…';
  try{
    const r=await fetch('/api/auth',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({password:pw.value})});
    if(r.ok){msg.className='msg ok';msg.textContent='Welcome back. Loading…';
      location.href='/';}
    else{msg.className='msg err';msg.textContent='Incorrect password. Try again.';
      btn.disabled=false;btn.textContent='Sign in';pw.value='';pw.focus();}
  }catch(err){msg.className='msg err';msg.textContent='Something went wrong. Please retry.';
    btn.disabled=false;btn.textContent='Sign in';}
});
</script>
</body>
</html>
